```html
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

/* ---------------- BODY ---------------- */

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* ---------------- GIFT SCREEN ---------------- */

#giftScreen{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.gift{
font-size:120px;
cursor:pointer;
animation:giftFloat 2s ease-in-out infinite;
}

@keyframes giftFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-18px)}
100%{transform:translateY(0)}
}

.openText{
font-size:22px;
opacity:0.8;
margin-top:10px;
}

/* ---------------- MAIN CONTENT ---------------- */

#mainContent{
display:none;
height:100vh;
background:linear-gradient(135deg,#ff7eb3,#ff758c);
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

h1{
font-size:60px;
}

#typing{
font-size:28px;
height:40px;
}

/* ---------------- NICKNAMES ---------------- */

.nickname{
position:absolute;
font-size:22px;
font-weight:bold;
white-space:nowrap;
text-shadow:0 0 10px white;

z-index:2; /* Behind letter */
}

/* ---------------- FLOATING HEARTS ---------------- */

.heart{
position:absolute;
bottom:-20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

/* ---------------- SWEET LETTER ---------------- */

#letter{

position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);

z-index:10; /* Always above nicknames */

background:white;
color:#333;

padding:20px 30px;
width:560px;
max-width:80vw;

border-radius:24px;

border:4px solid #7a5cff;

box-shadow:
0 0 12px #7a5cff,
0 0 30px rgba(122,92,255,0.7),
0 10px 25px rgba(0,0,0,0.25);

font-size:17px;
line-height:1.6;

display:none;
opacity:0;
text-align:center;
}

/* fade + floating */

.fadeLetter{
animation:
fadeIn 1.6s ease forwards,
floatLetter 3s ease-in-out infinite;
}

@keyframes fadeIn{
from{opacity:0;transform:translate(-50%,40px);}
to{opacity:1;transform:translate(-50%,0);}
}

@keyframes floatLetter{
0%{transform:translate(-50%,0)}
50%{transform:translate(-50%,-12px)}
100%{transform:translate(-50%,0)}
}

</style>
</head>

<body>

<!-- Gift screen -->

<div id="giftScreen">

<div class="gift" onclick="openGift()">🎁</div>

<div class="openText">Click the gift</div>

</div>

<!-- Main content -->

<div id="mainContent">

<h1>🎂 Happy Birthday 🎂</h1>

<div id="typing"></div>

</div>

<!-- Sweet Letter -->

<div id="letter">

💌 You are not just my best friend.<br><br>

You make my days brighter and my life happier.
Having you in my life is one of the greatest gifts.

<br><br>

Happy Birthday 🎉  
May your life always be filled with happiness,
success and beautiful memories.

</div>

<script>

/* ---------------- OPEN GIFT ---------------- */

function openGift(){

document.getElementById("giftScreen").style.display="none";

document.getElementById("mainContent").style.display="flex";

confettiExplosion();

startEffects();

}

/* ---------------- CONFETTI ---------------- */

function confettiExplosion(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.style.position="absolute";
c.style.width="8px";
c.style.height="14px";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.top="50%";
c.style.left="50%";

document.body.appendChild(c);

let angle=Math.random()*2*Math.PI;
let dist=Math.random()*600;

let x=Math.cos(angle)*dist;
let y=Math.sin(angle)*dist;

c.animate([
{transform:"translate(0,0) rotate(0deg)",opacity:1},
{transform:`translate(${x}px,${y}px) rotate(720deg)`,opacity:0}
],{duration:2000,easing:"ease-out"});

setTimeout(()=>c.remove(),2000);

}

}

/* ---------------- START EFFECTS ---------------- */

function startEffects(){

typing();

createNicknames();

setInterval(createHeart,350);

setTimeout(()=>{

let letter=document.getElementById("letter");

letter.style.display="block";

setTimeout(()=>letter.classList.add("fadeLetter"),100);

},5000);

}

/* ---------------- TYPING TEXT ---------------- */

let text="To the most amazing best friend in my life...";
let i=0;

function typing(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,70);

}

}

/* ---------------- ORBITING NICKNAMES ---------------- */

const nicknames=[
"Cutie",
"Angel",
"Bestie",
"Sunshine",
"Drama Queen",
"Little Monster",
"My Favourite Human"
];

function createNicknames(){

let total=nicknames.length;

let radiusX=window.innerWidth/2-120;
let radiusY=window.innerHeight/2-120;

nicknames.forEach((name,index)=>{

let el=document.createElement("div");

el.className="nickname";

el.innerText=name;

document.body.appendChild(el);

let angle=(360/total)*index;

function animate(){

angle+=0.2;

let x=window.innerWidth/2+radiusX*Math.cos(angle*Math.PI/180);

let y=window.innerHeight/2+radiusY*Math.sin(angle*Math.PI/180);

el.style.left=x+"px";
el.style.top=y+"px";

requestAnimationFrame(animate);

}

animate();

});

}

/* ---------------- FLOATING HEARTS ---------------- */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+12)+"px";

heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

}

/* ---------------- HEART BURST ON CLICK ---------------- */

function heartBurst(x,y){

for(let i=0;i<12;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="absolute";
heart.style.left=x+"px";
heart.style.top=y+"px";

heart.style.fontSize=(Math.random()*18+12)+"px";

document.body.appendChild(heart);

let angle=Math.random()*2*Math.PI;

let dist=Math.random()*120;

let moveX=Math.cos(angle)*dist;
let moveY=Math.sin(angle)*dist-150;

heart.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${moveX}px,${moveY}px)`,opacity:0}
],{duration:1800,easing:"ease-out"});

setTimeout(()=>heart.remove(),1800);

}

}

document.addEventListener("click",e=>{

heartBurst(e.clientX,e.clientY);

});

</script>

</body>
</html>
