<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise</title>

    <style>
        /* ---------- GLOBAL ---------- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Stops horizontal/vertical scrolling */
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            /* Better mobile viewport handling */
            touch-action: none;
            /* Prevents zoom/scroll interference */
        }

        /* ---------- GIFT SCREEN ---------- */
        #giftScreen {
            position: fixed;
            inset: 0;
            /* Shorthand for top/left/right/bottom: 0 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            z-index: 100;
        }

        .gift {
            font-size: clamp(80px, 25vw, 120px);
            cursor: pointer;
            animation: giftFloat 2s ease-in-out infinite;
            user-select: none;
        }

        @keyframes giftFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* ---------- MAIN PAGE ---------- */
        #mainContent {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: clamp(28px, 8vw, 55px);
            margin: 0 10px 10px 10px;
            width: 90%;
            word-wrap: break-word;
            /* Ensure it wraps on narrow screens */
        }

        #typing {
            font-size: clamp(16px, 5vw, 26px);
            min-height: 80px;
            /* Leave more space for 2-3 lines on mobile */
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            word-wrap: break-word;
        }

        /* ---------- NICKNAMES ---------- */
        .nickname {
            position: absolute;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
            z-index: 5;
            /* Center the element on its coordinate */
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* ---------- FLOATING HEARTS ---------- */
        .heart {
            position: absolute;
            bottom: -50px;
            z-index: 2;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        /* ---------- SWEET LETTER ---------- */
        #letter {
            position: absolute;
            bottom: max(5vh, 20px);
            /* Dynamic bottom considering mobile nav bars */
            left: 50%;
            transform: translate(-50%, 0);
            z-index: 100;
            background: white;
            color: #333;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            border: 3px solid #7a5cff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-size: clamp(14px, 4.2vw, 18px);
            line-height: 1.5;
            display: none;
            opacity: 0;
            text-align: center;
            max-height: 45vh;
            /* Keep it from covering the main central text */
            overflow-y: auto;
            /* Allow scrolling within the letter if height constrained */
        }

        .fadeLetter {
            animation: fadeIn 1.2s ease forwards, floatLetter 3s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, 30px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes floatLetter {

            0%,
            100% {
                margin-bottom: 0;
            }

            50% {
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="giftScreen">
        <div class="gift" onclick="openGift()">🎁</div>
        <div class="openText">Tap the gift</div>
    </div>

    <div id="mainContent">
        <h1>🎂 Happy Birthday di paithiyakari😘🎂</h1>
        <div id="typing"></div>
    </div>

    <div id="letter">
        💌 You are not just my best friend.<br><br>
        You make my days brighter and my life happier.
        Having you in my life is one of the greatest gifts.<br><br>
        <b>Happy Birthday 🎉</b><br>
        May your life always be filled with happiness and success.
    </div>

    <script>
        function openGift() {
            document.getElementById("giftScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
            confettiExplosion();
            startEffects();
        }

        function confettiExplosion() {
            for (let i = 0; i < 80; i++) {
                let c = document.createElement("div");
                c.style.position = "absolute";
                c.style.width = "10px";
                c.style.height = "10px";
                c.style.background = `hsl(${Math.random() * 360},100%,50%)`;
                c.style.left = "50%";
                c.style.top = "50%";
                c.style.zIndex = "10";
                document.body.appendChild(c);

                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * window.innerWidth * 0.8;
                let x = Math.cos(angle) * dist;
                let y = Math.sin(angle) * dist;

                c.animate([
                    { transform: "translate(0,0) rotate(0deg)", opacity: 1 },
                    { transform: `translate(${x}px,${y}px) rotate(720deg)`, opacity: 0 }
                ], { duration: 2000, easing: "ease-out" });

                setTimeout(() => c.remove(), 2000);
            }
        }

        function startEffects() {
            typing();
            createNicknames();
            setInterval(createHeart, 450);
            setTimeout(() => {
                let letter = document.getElementById("letter");
                letter.style.display = "block";
                setTimeout(() => letter.classList.add("fadeLetter"), 100);
            }, 4500);
        }

        let text = "To the most amazing best friend in my life...";
        let charIdx = 0;
        function typing() {
            if (charIdx < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(charIdx);
                charIdx++;
                setTimeout(typing, 70);
            }
        }

        const nicknames = ["Cutie", "Angel", "Bestie", "Sunshine", "Drama Queen", "Little Monster", "My Fav Human"];

        function createNicknames() {
            let total = nicknames.length;
            // Calculate radius to keep elements visible on screen
            // Keep at least 60px inner offset from width to prevent horizontal cut-offs
            let radiusX = Math.min(window.innerWidth * 0.35, (window.innerWidth / 2) - 60);
            radiusX = Math.max(radiusX, 20); // Minimum acceptable radius
            let radiusY = window.innerHeight * 0.28;

            nicknames.forEach((name, index) => {
                let el = document.createElement("div");
                el.className = "nickname";
                el.innerText = name;
                document.body.appendChild(el);

                let angle = (360 / total) * index;
                function animate() {
                    angle += 0.15;
                    let x = window.innerWidth / 2 + radiusX * Math.cos(angle * Math.PI / 180);
                    let y = window.innerHeight / 2 + radiusY * Math.sin(angle * Math.PI / 180);

                    el.style.left = x + "px";
                    el.style.top = y + "px";
                    requestAnimationFrame(animate);
                }
                animate();
            });
        }

        function createHeart() {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 90 + 5 + "vw";
            heart.style.fontSize = (Math.random() * 15 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 2 + 4) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function heartBurst(x, y) {
            for (let i = 0; i < 8; i++) {
                let h = document.createElement("div");
                h.innerHTML = "❤️";
                h.style.position = "fixed";
                h.style.left = x + "px";
                h.style.top = y + "px";
                h.style.pointerEvents = "none";
                document.body.appendChild(h);

                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * 80;
                let mx = Math.cos(angle) * dist;
                let my = Math.sin(angle) * dist - 80;

                h.animate([
                    { transform: "translate(0,0)", opacity: 1 },
                    { transform: `translate(${mx}px,${my}px)`, opacity: 0 }
                ], { duration: 1200 });

                setTimeout(() => h.remove(), 1200);
            }
        }

        document.addEventListener("click", e => heartBurst(e.clientX, e.clientY));
    </script>

</body>

</html>
